# CI for aya-rs pure-Rust BPF schedulers and arena data structures
#
# Jobs:
#   1. arena-checks:    Host-only arena unit tests, compile checks, benchmarks
#   2. arena-vm-tests:  Arena BPF integration tests in a VM (kernel 6.18+)
#   3. build-and-test:  Scheduler build + VM test matrix (3 kernels × 3 schedulers)
#
# Why Nix?
#   1. Pre-built sched_ext kernel images via Cachix — avoids 30+ min kernel
#      builds in CI. The scx project maintains these Nix derivations.
#   2. bpftool — not packaged in Ubuntu's APT repos. The Nix package
#      (nixpkgs#bpftools) is the simplest way to get a current build.

name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  # ── Arena data structure checks (host-only, no VM) ─────────────────
  arena-checks:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    name: "arena / host checks"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -f -y rustup pkg-config libelf-dev
          echo /usr/lib/llvm-19/bin >> $GITHUB_PATH

      - name: Install Rust toolchain
        run: |
          rustup default nightly
          rustup component add rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: aya
          prefix-key: "arena-checks"

      - name: "Unit tests: aya-arena-common"
        working-directory: aya
        run: cargo test -p aya-arena-common

      - name: "Compile check: arena-poc"
        working-directory: aya
        run: cargo build -p arena-poc

      - name: "Compile check: arena-bench"
        working-directory: aya
        run: cargo build -p arena-bench

      - name: "Run benchmarks: arena-bench"
        working-directory: aya
        run: cargo run -p arena-bench

  # ── Arena BPF integration tests (VM with arena-capable kernel) ─────
  arena-vm-tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    name: "arena / BPF integration (${{ matrix.kernel }})"

    strategy:
      fail-fast: false
      matrix:
        kernel: ["6.18-for-next"]
        include:
          - kernel: "6.18-for-next"
            kernel_nix_id: sched_ext/for-next
            allow_test_failure: false

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Configure Cachix (sched-ext kernel cache)
        uses: cachix/cachix-action@v14
        with:
          name: sched-ext
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          skipAddingSubstituter: false
          useDaemon: false

      - name: Configure fast APT mirror
        uses: vegardit/fast-apt-mirror.sh@1.4.1
        with:
          exclude-current: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -f -y \
            bison cmake cpio elfutils file flex gcc gcc-multilib git \
            iproute2 jq kbd kmod libcap-dev libelf-dev libunwind-dev \
            libzstd-dev linux-tools-common make ninja-build pahole \
            pkg-config python3-dev python3-pip python3-requests \
            qemu-kvm rsync udev zstd libseccomp-dev \
            libcap-ng-dev llvm-19 clang-19 python3-full dwarves \
            rustup autopoint
          echo /usr/lib/llvm-19/bin >> $GITHUB_PATH

      - name: Install bpftool via Nix
        run: |
          BPFTOOL_PATH=$(nix build --no-link --print-out-paths nixpkgs#bpftools)
          echo "$BPFTOOL_PATH/bin" >> $GITHUB_PATH

      - name: Install Rust toolchains
        run: |
          rustup default nightly
          rustup component add rust-src

      - name: Setup KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install virtme-ng
        run: sudo pip3 install virtme-ng --break-system-packages

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: aya
          prefix-key: "arena-vm-${{ matrix.kernel }}"

      - name: "Load kernel (${{ matrix.kernel }})"
        run: |
          KERNEL_NAME="${{ matrix.kernel_nix_id }}"
          KERNEL_STORE_PATH=$(nix build --no-link --print-out-paths ./scx/.nix#kernel_${KERNEL_NAME})
          echo "KERNEL_STORE_PATH=$KERNEL_STORE_PATH" >> $GITHUB_ENV

      - name: Install bpf-linker
        run: cargo +nightly install bpf-linker --no-default-features --features rust-llvm-22

      - name: "Build arena integration tests"
        working-directory: aya
        run: |
          AYA_BUILD_INTEGRATION_BPF=true cargo test -p integration-test --no-run --message-format=json 2>/dev/null \
            | jq -r 'select(.executable != null and .target.name == "integration-test") | .executable' \
            | head -1 > /tmp/arena-test-bin-path
          TEST_BIN=$(cat /tmp/arena-test-bin-path)
          if [[ -z "$TEST_BIN" || ! -f "$TEST_BIN" ]]; then
            echo "ERROR: Could not find integration-test binary"
            # Fallback: search in target directory
            TEST_BIN=$(find target -name 'integration_test-*' -type f -executable 2>/dev/null | head -1)
          fi
          echo "ARENA_TEST_BIN=$TEST_BIN" >> $GITHUB_ENV
          echo "Test binary: $TEST_BIN"
          file "$TEST_BIN"

      - name: "VM Test: arena integration on ${{ matrix.kernel }}"
        continue-on-error: ${{ matrix.allow_test_failure }}
        run: |
          chmod +x .github/scripts/test-arena.sh
          .github/scripts/test-arena.sh \
            "$KERNEL_STORE_PATH/bzImage" \
            "$ARENA_TEST_BIN"

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "arena-test-logs-${{ matrix.kernel }}"
          path: "*.ci.log"
          compression-level: 9

  # ── Scheduler build + VM test ──────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    name: "${{ matrix.scheduler }} / ${{ matrix.kernel }}"

    strategy:
      fail-fast: false
      matrix:
        kernel: ["6.12", "6.18-for-next", "7.0"]
        scheduler: [scx_cosmos, scx_simple, scx_mitosis]
        include:
          # --- Per-kernel config ---
          - kernel: "6.12"
            kernel_nix_id: stable/6_12
            allow_test_failure: true
          - kernel: "6.18-for-next"
            kernel_nix_id: sched_ext/for-next
            allow_test_failure: false
          - kernel: "7.0"
            kernel_nix_id: stable/7_0
            allow_test_failure: true
          # --- Per-scheduler config ---
          - scheduler: scx_cosmos
            sched_path: scx/scheds/rust_only/scx_cosmos
            sched_binary: scx_cosmos_rs
            sched_display: "scx_cosmos_rs (Rust port)"
            test_seconds: 30
          - scheduler: scx_simple
            sched_path: scx/scheds/rust_only/scx_simple
            sched_binary: scx_simple
            sched_display: "scx_simple (Rust FIFO)"
            test_seconds: 15
          - scheduler: scx_mitosis
            sched_path: scx/scheds/rust_only/scx_mitosis
            sched_binary: scx_mitosis_rs
            sched_display: "scx_mitosis_rs (Rust port)"
            test_seconds: 15
          # --- Per-combo overrides ---
          - kernel: "6.18-for-next"
            scheduler: scx_cosmos
            extra_cargo_flags: "--features kernel_6_16"
          - kernel: "7.0"
            scheduler: scx_cosmos
            extra_cargo_flags: "--features kernel_6_16"

    env:
      EXTRA_CARGO_FLAGS: ${{ matrix.extra_cargo_flags || '' }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # --- Nix + Cachix (for pre-built kernels and bpftool) ---
      - name: Install Nix
        uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Configure Cachix (sched-ext kernel cache)
        uses: cachix/cachix-action@v14
        with:
          name: sched-ext
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          skipAddingSubstituter: false
          useDaemon: false

      # --- System dependencies ---
      - name: Configure fast APT mirror
        uses: vegardit/fast-apt-mirror.sh@1.4.1
        with:
          exclude-current: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -f -y \
            bison cmake cpio elfutils file flex gcc gcc-multilib git \
            iproute2 jq kbd kmod libcap-dev libelf-dev libunwind-dev \
            libzstd-dev linux-tools-common make ninja-build pahole \
            pkg-config python3-dev python3-pip python3-requests \
            qemu-kvm rsync stress-ng udev zstd libseccomp-dev \
            libcap-ng-dev llvm-19 clang-19 python3-full dwarves \
            rustup protobuf-compiler
          echo /usr/lib/llvm-19/bin >> $GITHUB_PATH

      - name: Install bpftool via Nix
        run: |
          BPFTOOL_PATH=$(nix build --no-link --print-out-paths nixpkgs#bpftools)
          echo "$BPFTOOL_PATH/bin" >> $GITHUB_PATH

      # --- Rust toolchain ---
      - name: Install Rust toolchains
        run: |
          rustup default nightly
          rustup component add rust-src

      # --- KVM setup ---
      - name: Setup KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # --- virtme-ng ---
      - name: Install virtme-ng
        run: sudo pip3 install virtme-ng --break-system-packages

      # --- Build schbench ---
      - name: Build schbench
        run: |
          git clone https://git.kernel.org/pub/scm/linux/kernel/git/mason/schbench.git /tmp/schbench
          cd /tmp/schbench
          make
          sudo cp schbench /usr/local/bin/

      # --- Rust cache ---
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: scx
          prefix-key: "${{ matrix.scheduler }}-${{ matrix.kernel }}"

      # --- Load kernel from Cachix ---
      - name: "Load kernel (${{ matrix.kernel }})"
        run: |
          KERNEL_NAME="${{ matrix.kernel_nix_id }}"
          echo "Building/fetching kernel: $KERNEL_NAME"
          KERNEL_STORE_PATH=$(nix build --no-link --print-out-paths ./scx/.nix#kernel_${KERNEL_NAME})
          echo "KERNEL_STORE_PATH=$KERNEL_STORE_PATH" >> $GITHUB_ENV
          echo "Kernel at: $KERNEL_STORE_PATH"
          ls -la "$KERNEL_STORE_PATH/"

      - name: Extract vmlinux from bzImage
        run: |
          BZIMAGE="${KERNEL_STORE_PATH}/bzImage"
          VMLINUX="/tmp/vmlinux-target"

          extract_try() {
            for pos in $(tr "$1\n$2" "\n$2=" < "$BZIMAGE" | grep -abo "^$2"); do
              pos=${pos%%:*}
              tail -c+$pos "$BZIMAGE" | $3 > "$VMLINUX" 2>/dev/null
              if readelf -h "$VMLINUX" >/dev/null 2>&1; then
                return 0
              fi
            done
            return 1
          }

          extract_try '\037\213\010' xy gunzip || \
          extract_try '\3757zXZ\000' abcde unxz || \
          extract_try '(\265/\375' xxx unzstd || \
          extract_try 'BZh' xy bunzip2 || \
          extract_try '\002!L\030' xxx 'lz4 -d' || true

          if [ -f "$VMLINUX" ] && readelf -h "$VMLINUX" >/dev/null 2>&1; then
            echo "SCX_VMLINUX_BTF=$VMLINUX" >> $GITHUB_ENV
            echo "Extracted vmlinux: $(file "$VMLINUX" | head -1)"
            bpftool btf dump file "$VMLINUX" format c 2>&1 | head -3
          else
            echo "WARNING: Could not extract vmlinux from bzImage"
            echo "Will fall back to runner kernel BTF (/sys/kernel/btf/vmlinux)"
          fi

      # --- Install bpf-linker ---
      - name: Install bpf-linker
        run: cargo +nightly install bpf-linker --no-default-features --features rust-llvm-22

      # --- Build scheduler ---
      - name: "Build ${{ matrix.sched_display }}"
        run: |
          cd ${{ matrix.sched_path }}
          if [ -n "${SCX_VMLINUX_BTF:-}" ]; then
            echo "Using target kernel BTF: $SCX_VMLINUX_BTF"
          else
            echo "Using runner kernel BTF: /sys/kernel/btf/vmlinux"
          fi
          cargo build --release $EXTRA_CARGO_FLAGS
          echo "SCHED_BIN=$(pwd)/target/release/${{ matrix.sched_binary }}" >> $GITHUB_ENV

      # --- Debug info ---
      - name: Debug info
        run: |
          echo "Kernel: $KERNEL_STORE_PATH"
          echo "Scheduler: $SCHED_BIN"
          grep 'model name' /proc/cpuinfo | head -1
          file "$SCHED_BIN"

      # --- VM test ---
      - name: "VM Test: ${{ matrix.sched_display }} on ${{ matrix.kernel }}"
        continue-on-error: ${{ matrix.allow_test_failure }}
        run: |
          chmod +x .github/scripts/test-scheduler.sh
          .github/scripts/test-scheduler.sh \
            "$KERNEL_STORE_PATH/bzImage" \
            "$SCHED_BIN" \
            ${{ matrix.test_seconds }}

      # --- Upload logs ---
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "test-logs-${{ matrix.scheduler }}-${{ matrix.kernel }}"
          path: "*.ci.log"
          compression-level: 9
